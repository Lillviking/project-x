<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fridas Homelab</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 800px;
      margin: 4rem auto;
      padding: 0 1.5rem;
      background: #f6f4ef;
      color: #1f2933;
      line-height: 1.6;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
    }

    code {
      background: #eee;
      padding: 0.15rem 0.35rem;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Fridas Homelab</h1>
    <p>Det här är min första egna hemsida som körs i en Docker-container.</p>

    <h2>Vad jag lär mig</h2>
    <ul>
      <li>Linux</li>
      <li>Docker</li>
      <li>Docker Compose</li>
      <li>Self-hosting</li>
      <li>Nginx</li>
    </ul>

    <p>Körs med <code>nginx</code> på port <code>8080</code>.</p>
  </main>
</body>
</html>
